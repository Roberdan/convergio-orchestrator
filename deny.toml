# cargo-deny configuration (v2 format)

[graph]
targets = []
all-features = true

[advisories]
version = 2
# rustls-webpki name-constraints verification bugs. Affect rustls-webpki
# up to and including 0.103.12 (the latest stable as of 2026-04-21); the
# only fix line is 0.104.0-alpha.* which is not shipping-ready. Our
# daemon-to-daemon paths use pinned HMAC + tailscale mesh, not raw TLS
# against untrusted chains, so operational impact is low. Remove once
# cargo resolves to a stable 0.104.x.
ignore = [
    "RUSTSEC-2026-0098",
    "RUSTSEC-2026-0099",
]

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "MPL-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

[[licenses.exceptions]]
allow = ["LicenseRef-Convergio-Community"]
crate = "convergio-orchestrator"

[[licenses.exceptions]]
allow = ["LicenseRef-Convergio-Community"]
crate = "convergio-evidence"

[[licenses.exceptions]]
allow = ["LicenseRef-Convergio-Community"]
crate = "convergio-types"

[[licenses.exceptions]]
allow = ["LicenseRef-Convergio-Community"]
crate = "convergio-telemetry"

[[licenses.exceptions]]
allow = ["LicenseRef-Convergio-Community"]
crate = "convergio-db"

[[licenses.exceptions]]
allow = ["LicenseRef-Convergio-Community"]
crate = "convergio-security"

[[licenses.exceptions]]
allow = ["LicenseRef-Convergio-Community"]
crate = "convergio-ipc"

[[licenses.exceptions]]
allow = ["LicenseRef-Convergio-Community"]
crate = "convergio-scaffold"

[[licenses.exceptions]]
allow = ["LicenseRef-Convergio-Community"]
crate = "convergio-ceo"

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "allow"
allow-git = [
    "https://github.com/Roberdan/convergio-sdk",
    "https://github.com/Roberdan/convergio-ipc",
    "https://github.com/Roberdan/convergio-scaffold",
    "https://github.com/Roberdan/convergio-ceo",
]
